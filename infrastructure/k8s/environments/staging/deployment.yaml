apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: inventory-staging
  labels:
    app: inventory-api
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: inventory-api
        environment: staging
    spec:
      serviceAccountName: inventory-api
      containers:
        - name: inventory-api
          image: inventory-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: inventory-api-config
            - secretRef:
                name: inventory-api-secrets
          resources:
            requests:
              cpu: "150m"
              memory: "384Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /up
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /up
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: inventory-staging
spec:
  selector:
    app: inventory-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api-lb
  namespace: inventory-staging
  labels:
    environment: staging
spec:
  type: LoadBalancer
  selector:
    app: inventory-api
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inventory-api-hpa
  namespace: inventory-staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inventory-api
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
