apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: inventory-dev
  labels:
    app: inventory-api
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
        environment: dev
    spec:
      serviceAccountName: inventory-api
      containers:
        - name: inventory-api
          image: inventory-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: inventory-api-config
            - secretRef:
                name: inventory-api-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /up
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /up
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: inventory-dev
spec:
  selector:
    app: inventory-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api-lb
  namespace: inventory-dev
  labels:
    environment: dev
spec:
  type: LoadBalancer
  selector:
    app: inventory-api
  ports:
    - port: 80
      targetPort: 8080
