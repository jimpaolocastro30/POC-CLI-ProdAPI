steps:
  - name: 'gcr.io/cloud-builders/composer'
    id: 'composer-install'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'composer install --no-interaction --prefer-dist --optimize-autoloader'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker run --rm -v $(pwd):/app -w /app php:8.3-cli bash -c \
          "apt-get update -qq && apt-get install -y -qq libzip-dev unzip git && \
           docker-php-ext-install pdo zip && \
           curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer && \
           composer install -q && php artisan test"

  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/inventory-api/inventory-api:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/inventory-api/inventory-api:staging-latest'
      - '-f'
      - 'docker/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/inventory-api/inventory-api'

  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'deploy'
    args:
      - 'run'
      - '--filename=infrastructure/k8s/environments/staging/'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/inventory-api/inventory-api:${SHORT_SHA}'
      - '--location=${_REGION}'
      - '--cluster=inventory-cluster-staging'

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/inventory-api/inventory-api:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/inventory-api/inventory-api:staging-latest'
